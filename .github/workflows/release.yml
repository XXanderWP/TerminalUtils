name: Create Release

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release from pyproject version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: '22'


      - name: 🏷️ Get version from package.json
        id: get_version
        run: |
          RELEASE_VERSION=$(node -p "require('./package.json').version")
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: 🔍 Check if release exists
        id: check_release
        shell: bash
        run: |
          VERSION="v${{ env.RELEASE_VERSION }}"
          echo "Checking for release $VERSION..."
          if gh release view "$VERSION" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ❌ Cancel workflow if release exists
        if: steps.check_release.outputs.exists == 'true'
        run: |
          echo "Release v${{ env.RELEASE_VERSION }} already exists. Cancelling workflow."
          exit 0

      - name: Install packages
        if: steps.check_release.outputs.exists == 'false'
        run: |
          npm ci

      - name: Build project
        if: steps.check_release.outputs.exists == 'false'
        run: |
          npm run build
          cp src/utils/install* /dist/

      - name: Create GitHub Release and upload payload
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.RELEASE_VERSION }}"
          name: "v${{ env.RELEASE_VERSION }}"
          body: "Automated release created by workflow from package.json version"
          files: dist/*
